services:
  - type: web
    name: hybo-api
    env: node
    region: oregon
    buildCommand: pnpm install && pnpm run build --filter=@hybo/api && pnpm run build --filter=@hybo/database
    startCommand: pnpm --filter @hybo/api run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hybo-db
          property: connectionString
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: hybo-db
    databaseName: hybo
    user: hybo
